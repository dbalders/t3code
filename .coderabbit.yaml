# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
early_access: false

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: false
  path_filters:
    - "!.repos/**"
    - "!apps/web/src/routeTree.gen.ts"
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "tritongpt"

knowledge_base:
  code_guidelines:
    enabled: true

chat:
  auto_reply: true
