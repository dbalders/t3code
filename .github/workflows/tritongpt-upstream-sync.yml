name: TritonGPT Upstream Sync

on:
  schedule:
    # Daily at 11:17 UTC. The runner can be DSMLP or any self-hosted Linux box.
    - cron: "17 11 * * *"
  workflow_dispatch:
    inputs:
      brand_branch:
        description: "Downstream branded branch to merge into"
        required: true
        default: tritongpt
        type: string
      create_pr:
        description: "Push sync branch and open a PR"
        required: true
        default: true
        type: boolean
      auto_merge_pr:
        description: "Merge auto-merge-ready PRs after local checks and AI review"
        required: true
        default: true
        type: boolean
      skip_checks:
        description: "Skip local quality checks"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: tritongpt-upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Merge upstream into TritonGPT branch
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup upstream remote
        run: |
          git remote add upstream https://github.com/pingdotgg/t3code.git 2>/dev/null || true
          git remote set-url upstream https://github.com/pingdotgg/t3code.git

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Sync and review upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LITELLM_BASE_URL: ${{ secrets.LITELLM_BASE_URL }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          T3_SYNC_LITELLM_MODEL: ${{ secrets.T3_SYNC_LITELLM_MODEL }}
          T3_SYNC_REVIEW_MODE: ${{ vars.T3_SYNC_REVIEW_MODE || 'agent' }}
          T3_SYNC_AGENT_COMMAND: ${{ secrets.T3_SYNC_AGENT_COMMAND }}
          T3_SYNC_AGENT_MODEL: ${{ vars.T3_SYNC_AGENT_MODEL || 'ucsd/deepseek-v4-flash-max' }}
          T3_SYNC_AGENT_CAN_EDIT: ${{ vars.T3_SYNC_AGENT_CAN_EDIT || '1' }}
          T3_SYNC_AGENT_SECRET_ENV_ALLOWLIST: ${{ vars.T3_SYNC_AGENT_SECRET_ENV_ALLOWLIST || 'TRITONAI_API_KEY' }}
          TRITONAI_API_KEY: ${{ secrets.TRITONAI_API_KEY }}
          T3_SYNC_BRAND_BRANCH: ${{ vars.T3_SYNC_BRAND_BRANCH || 'tritongpt' }}
          T3_SYNC_AUTO_MERGE_PR: ${{ vars.T3_SYNC_AUTO_MERGE_PR || 'true' }}
          T3_SYNC_PR_MERGE_METHOD: ${{ vars.T3_SYNC_PR_MERGE_METHOD || 'merge' }}
          T3_SYNC_PR_MERGE_MODE: ${{ vars.T3_SYNC_PR_MERGE_MODE || 'now' }}
          T3_SYNC_GITHUB_REPO: ${{ github.repository }}
          GH_REPO: ${{ github.repository }}
        run: |
          brand_branch="${{ github.event.inputs.brand_branch }}"
          if [[ -z "$brand_branch" ]]; then
            brand_branch="${T3_SYNC_BRAND_BRANCH:-tritongpt}"
          fi
          export T3_SYNC_BRAND_BRANCH="$brand_branch"

          create_pr="${{ github.event.inputs.create_pr }}"
          if [[ -z "$create_pr" ]]; then
            create_pr="true"
          fi

          auto_merge_pr="${{ github.event.inputs.auto_merge_pr }}"
          if [[ -z "$auto_merge_pr" ]]; then
            auto_merge_pr="${T3_SYNC_AUTO_MERGE_PR:-true}"
          fi

          skip_checks="${{ github.event.inputs.skip_checks }}"
          if [[ -z "$skip_checks" ]]; then
            skip_checks="false"
          fi

          args=(--push)

          if [[ "$create_pr" == "true" ]]; then
            args+=(--create-pr)
          fi

          if [[ "$auto_merge_pr" == "true" ]]; then
            args+=(--auto-merge-pr)
          fi

          if [[ "$skip_checks" == "true" ]]; then
            args+=(--skip-checks)
          fi

          node scripts/tritongpt-sync-upstream.mjs "${args[@]}"
