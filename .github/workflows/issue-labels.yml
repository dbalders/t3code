name: Issue Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/ISSUE_TEMPLATE/**
      - .github/workflows/issue-labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync issue labels
    runs-on: ubuntu-24.04
    steps:
      - name: Ensure managed issue labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const managedLabels = [
              {
                name: "bug",
                color: "d73a4a",
                description: "Something is broken or behaving incorrectly.",
              },
              {
                name: "enhancement",
                color: "a2eeef",
                description: "Requested improvement or new capability.",
              },
              {
                name: "needs-triage",
                color: "fbca04",
                description: "Issue needs maintainer review and initial categorization.",
              },
              {
                name: "automation:upstream-sync",
                color: "5319e7",
                description: "Generated by the TritonGPT upstream sync automation.",
              },
              {
                name: "automation:auto-merge-ready",
                color: "0e8a16",
                description: "Automation classified this upstream sync as safe to merge.",
              },
              {
                name: "needs-human-review",
                color: "d93f0b",
                description: "Automation could not safely finish this upstream sync.",
              },
              {
                name: "upstream-conflict",
                color: "b60205",
                description: "Upstream sync hit merge conflicts.",
              },
              {
                name: "checks-failed",
                color: "fbca04",
                description: "Local sync validation checks failed.",
              },
              {
                name: "ai-review-risk",
                color: "c5def5",
                description: "AI review found risk or could not provide a safe approval.",
              },
              {
                name: "agent-attempted",
                color: "bfd4f2",
                description: "The configured coding agent attempted review or repairs.",
              },
            ];

            for (const label of managedLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                if (
                  existing.color !== label.color ||
                  (existing.description ?? "") !== label.description
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
              }
            }
