name: Issue Labels

on:
  push:
    branches:
      - main
    paths:
      - .github/ISSUE_TEMPLATE/**
      - .github/workflows/issue-labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync issue labels
    runs-on: ubuntu-24.04
    steps:
      - name: Ensure managed issue labels exist
        uses: actions/github-script@v7
        with:
          script: |
            const managedLabels = [
              {
                name: "bug",
                color: "d73a4a",
                description: "Something is broken or behaving incorrectly.",
              },
              {
                name: "enhancement",
                color: "a2eeef",
                description: "Requested improvement or new capability.",
              },
              {
                name: "needs-triage",
                color: "fbca04",
                description: "Issue needs maintainer review and initial categorization.",
              },
              {
                name: "automation:auto",
                color: "5319e7",
                description: "Maintainer approved automatic issue implementation.",
              },
              {
                name: "automation:triaged",
                color: "bfd4f2",
                description: "Issue autopilot triaged this issue.",
              },
              {
                name: "automation:auto-pr",
                color: "0e8a16",
                description: "Issue autopilot considers this suitable for an automatic PR.",
              },
              {
                name: "automation:needs-human",
                color: "fbca04",
                description: "Issue autopilot needs maintainer input before continuing.",
              },
              {
                name: "automation:declined",
                color: "b60205",
                description: "Issue autopilot decided not to pursue this automatically.",
              },
              {
                name: "area:installer",
                color: "c5def5",
                description: "Issue belongs in the installer area.",
              },
              {
                name: "area:t3code",
                color: "c2e0c6",
                description: "Issue belongs in the T3 Code app area.",
              },
              {
                name: "area:both",
                color: "fef2c0",
                description: "Issue likely needs coordinated installer and app changes.",
              },
            ];

            for (const label of managedLabels) {
              try {
                const { data: existing } = await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name,
                });

                if (
                  existing.color !== label.color ||
                  (existing.description ?? "") !== label.description
                ) {
                  await github.rest.issues.updateLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                }
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }

                try {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                } catch (createError) {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                }
              }
            }
